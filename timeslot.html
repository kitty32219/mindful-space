<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人邀約空間 | Time & Space</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --accent-blue: #5d6d7e;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--muji-white);
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部導航 */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 25px 0;
            background: #fff;
            border-bottom: 1px solid var(--muji-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--muji-gray);
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        nav a.active {
            color: #000;
            font-weight: bold;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 角色守護者：橘色英短 */
        #cat-guardian {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 1000;
        }

        /* 景點卡片 */
        .spot-item {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .spot-title { font-size: 1.1rem; font-weight: 400; margin-bottom: 10px; }
        .spot-link { font-size: 0.8rem; color: var(--accent-blue); text-decoration: none; display: block; margin-bottom: 15px; }
        .spot-link:hover { text-decoration: underline; }
        .time-tag { display: inline-block; background: #f0f0f0; padding: 3px 10px; font-size: 0.75rem; border-radius: 20px; color: #666; }

    </style>
</head>
<body>

    <div id="cat-guardian" title="點擊換心情">🐈</div>

    <nav>
        <a onclick="showTab('calendar')" id="nav-calendar" class="active">空檔查詢</a>
        <a onclick="showTab('spots')" id="nav-spots">想去的地方</a>
    </nav>

    <div class="container">
        <!-- 分頁一：Calendly 預約 -->
        <div id="calendar" class="tab-content active">
            <header style="text-align: center; margin-bottom: 40px;">
                <h2 style="font-weight: 300; letter-spacing: 3px;">SCHEDULE</h2>
                <p style="font-size: 0.85rem; color: #999;">出遊時間!</p>
            </header>
            
            <!-- Calendly 內嵌組件開始 -->
            <div class="calendly-inline-widget" data-url="https://calendly.com/kitty32219/new-meeting" style="min-width:320px;height:700px;"></div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
            <!-- Calendly 內嵌組件結束 -->
        </div>

        <!-- 分頁二：景點清單 -->
        <div id="spots" class="tab-content">
            <header style="text-align: center; margin-bottom: 40px;">
                <h2 style="font-weight: 300; letter-spacing: 3px;">WISHLIST</h2>
                <p style="font-size: 0.85rem; color: #999;">這些是我感興趣的空間，歡迎在下方留言預約跟團。</p>
            </header>

            <!-- 景點範例 -->
            <div class="spot-item">
                <div class="spot-title">📍 景點名稱 (例如狗狗咖啡廳)</div>
                <a href="https://share.google/yM1xwbkXroTYkdVZk" target="_blank" class="spot-link">→ 點擊查看相關連結</a>
                <div class="time-tag">預計時段：5 月某個週末下午</div>
            </div>

            <!-- giscus 留言區：用於跟團討論 -->
            <div class="giscus">
<script src="https://giscus.app/client.js"
        data-repo="kitty32219/mindful-space"
        data-repo-id="R_kgDOSP7Znw"
        data-category="General"
        data-category-id="DIC_kwDOSP7Zn84C7984"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-TW"
        crossorigin="anonymous"
        async>
</script>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        // 橘貓心情切換
        const moods = ['🐈', '🧐', '🐾', '🍵'];
        document.getElementById('cat-guardian').onclick = function() {
            this.innerText = moods[Math.floor(Math.random() * moods.length)];
        };
    </script>
</body>
</html>
