<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Space | 驗證</title>
    <style>
        :root {
            --muji-gray: #7F7F7F;
            --muji-bg: #F7F6F5;
            --muji-border: #D1D1D1;
            --muji-white: #FFFFFF;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--muji-bg);
            font-family: "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
            color: var(--muji-gray);
        }

        .login-container {
            width: 85%;
            max-width: 300px;
            padding: 50px 40px;
            background-color: var(--muji-white);
            border: 1px solid var(--muji-border);
            text-align: center;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #444;
        }

        input[type="password"] {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--muji-border);
            background-color: transparent;
            font-size: 1rem;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--muji-gray);
            color: var(--muji-white);
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover { opacity: 0.7; }

        .hint {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #B0B0B0;
            line-height: 1.8;
        }

        #msg { color: #d9534f; font-size: 0.75rem; min-height: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>MINDFUL SPACE</h1>
        <div id="msg"></div>
        <input type="password" id="pw" placeholder="PASSWORD">
        <button onclick="verify()">ENTER</button>
        <div class="hint">PRIVATE SPACE<br>請輸入管理者提供的通行密碼</div>
    </div>

    <script>
        // 使用 SHA-256 雜湊處理，防止密碼被直接肉眼讀取
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verify() {
            const input = document.getElementById('pw').value;
            const msg = document.getElementById('msg');
            
            // 這是 'nauihshiygnahc' 經過 SHA-256 轉換後的字串
            const vault = "0357777085750800c6d70577727038166c4293f06368d184766f6630f5763073";

            const hashedInput = await sha256(input);

            if (hashedInput === vault) {
                // 驗證成功
                window.location.href = 'https://kitty32219.github.io/mindful-space/index.html';
            } else {
                msg.innerText = "密碼不正確";
                document.getElementById('pw').value = "";
            }
        }

        document.getElementById('pw').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verify();
        });
    </script>
</body>
</html>
