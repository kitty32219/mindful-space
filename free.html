<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人邀約實驗室 | AI Buffer Space</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --accent-blue: #5d6d7e;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--muji-white);
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 導航列 */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px 0;
            background: #fff;
            border-bottom: 1px solid var(--muji-border);
            position: sticky; top: 0; z-index: 100;
        }

        nav a {
            text-decoration: none;
            color: var(--muji-gray);
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        nav a.active {
            color: #000;
            font-weight: bold;
            border-bottom: 2px solid #000;
        }

        .container { width: 100%; max-width: 700px; padding: 40px 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* AI 代答區塊樣式 */
        .ai-chat-box {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 40px;
        }
        #ai-status-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #eee;
            margin-bottom: 10px;
            display: inline-block;
        }
        textarea {
            width: 100%; border: 1px solid #eee; padding: 10px;
            box-sizing: border-box; resize: none; margin-bottom: 10px;
        }
        button {
            background: #444; color: #fff; border: none; padding: 8px 20px;
            cursor: pointer; border-radius: 4px; font-size: 0.8rem;
        }

        /* 守護者橘貓 */
        #cat-guardian {
            position: fixed; bottom: 30px; right: 30px; font-size: 2.5rem;
            cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="cat-guardian" title="守護者：正在監控時區與資訊流">🐈</div>

    <nav>
        <a onclick="showTab('ai-chat')" id="nav-ai-chat" class="active">AI 代答諮詢</a>
        <a onclick="showTab('calendar')" id="nav-calendar">空檔預約</a>
        <a onclick="showTab('spots')" id="nav-spots">想去的地方</a>
    </nav>

    <div class="container">
        <!-- 分頁一：AI 代答 -->
        <div id="ai-chat" class="tab-content active">
            <header style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-weight: 300;">AI BUFFER AGENT</h2>
                <p style="font-size: 0.8rem; color: #999;">本人目前在忙，AI 將根據我的邏輯先行代答。</p>
            </header>

            <div class="ai-chat-box">
                <div id="ai-status-tag">STATUS: READY</div>
                <textarea id="user-input" rows="3" placeholder="請輸入妳的問題..."></textarea>
                <button onclick="askAI()">傳送給守護橘貓</button>
                <div id="ai-response" style="margin-top: 20px; font-size: 0.9rem; color: #555; white-space: pre-wrap;"></div>
            </div>
        </div>

        <!-- 分頁二：Calendly -->
        <div id="calendar" class="tab-content">
            <div class="calendly-inline-widget" data-url="https://calendly.com/kitty32219/new-meeting" style="min-width:320px;height:700px;"></div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        </div>

        <!-- 分頁三：景點 (使用 giscus) -->
        <div id="spots" class="tab-content">
            <h2 style="font-weight: 300; text-align: center;">WISHLIST</h2>
            <div class="giscus">
<script src="https://giscus.app/client.js"
        data-repo="kitty32219/mindful-space"
        data-repo-id="R_kgDOSP7Znw"
        data-category="General"
        data-category-id="DIC_kwDOSP7Zn84C7984"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-TW"
        crossorigin="anonymous"
        async>
</script>
            </div>
        </div>
    </div>

    <script>
        // 切換分頁邏輯
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav-' + tabId).classList.add('active');
        }

        // 呼叫 GAS 後端 AI
        async function askAI() {
            const input = document.getElementById('user-input').value;
            const responseDiv = document.getElementById('ai-response');
            const tag = document.getElementById('ai-status-tag');
            
            if (!input) return;

            tag.innerText = "STATUS: AI GENERATING...";
            responseDiv.innerText = "橘貓正在翻找筆記中...";

            try {
                const response = await fetch("https://script.google.com/macros/s/AKfycbxD2e8Y_hRiiyXMlDwv4V6525751smpmiq4D8HxB_YOMTycQwN_n5VNIxKpSX9t5Ntq/exec", {
                    method: "POST",
                    body: JSON.stringify({ prompt: input })
                });
                const data = await response.json();
                
                tag.innerText = "STATUS: AI GENERATED (Pending Confirmation)";
                tag.style.background = "#fff3cd"; // 換成警告色，代表本人尚未確認
                responseDiv.innerText = data.answer;
            } catch (e) {
                responseDiv.innerText = "連線失敗，可能是貓咪睡著了。";
                tag.innerText = "STATUS: ERROR";
            }
        }
    </script>
</body>
</html>
