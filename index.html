<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOWLEDGE GALLERY | 知識藝廊 2.0</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --accent-sand: #d7ccc8;
        }

        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            background-color: var(--muji-white);
            color: #333;
            margin: 0;
            line-height: 1.8;
            display: flex;
            justify-content: center;
        }

        /* 橘色英短守護者：隨動狀態 */
        #cat-guardian {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 2.8rem;
            z-index: 100;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cat-guardian:hover { transform: scale(1.2) rotate(5deg); }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 5px;
            font-size: 1.4rem;
            color: #444;
            text-transform: uppercase;
        }

        /* 標籤系統提示 */
        .tag-cloud {
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.75rem;
            color: var(--muji-gray);
        }
        .tag { margin: 0 5px; text-decoration: underline; cursor: pointer; }

        /* 格式生成器 */
        .template-box {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 25px;
            margin-bottom: 50px;
            border-radius: 4px;
            position: relative;
        }

        .template-box::before {
            content: "PROTOCOL HELPER";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--muji-white);
            padding: 0 10px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--muji-gray);
        }

        .copy-btn {
            background: #444;
            color: #fff;
            border: none;
            padding: 8px 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 2px;
            margin-top: 15px;
            transition: background 0.3s;
        }
        .copy-btn:hover { background: #666; }

        .giscus { margin-top: 40px; }
    </style>
</head>
<body>

    <!-- 守護者：橘色英短 (預設睿智狀態) -->
    <div id="cat-guardian" onclick="changeCatStatus()" title="點我檢查知識純度">🐈</div>

    <div class="container">
        <header>
            <h1>Knowledge Gallery</h1>
            <div class="tag-cloud">
                常用標籤：<span class="tag">#中醫</span> <span class="tag">#數學分析</span> <span class="tag">#投資邏輯</span> <span class="tag">#人性觀察</span>
            </div>
        </header>

        <section class="template-box">
            <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">
                為了維持藝廊的抗熵增特性，請使用以下格式投稿：
            </p>
            <code id="template-text" style="font-size: 0.8rem; color: #888; display: block; background: #f9f9f9; padding: 10px;">
                #標籤<br>
                【知識點】：<br>
                【解析】：<br>
                【出處】：
            </code>
            <button class="copy-btn" onclick="copyTemplate()">一鍵複製格式</button>
        </section>

        <div class="giscus">
<script src="https://giscus.app/client.js"
        data-repo="kitty32219/mindful-space"
        data-repo-id="R_kgDOSP7Znw"
        data-category="General"
        data-category-id="DIC_kwDOSP7Zn84C7984"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-TW"
        crossorigin="anonymous"
        async>
</script>
        </div>
    </div>

    <script>
        // 1. 複製模板功能
        function copyTemplate() {
            const text = document.getElementById('template-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('格式已複製，請至下方留言區貼上。');
            });
        }

        // 3. 橘貓守護者互動 (簡單範例)
        const catEmotes = ['🐈', '🧐', '🐾', '📙'];
        function changeCatStatus() {
            const cat = document.getElementById('cat-guardian');
            const randomEmote = catEmotes[Math.floor(Math.random() * catEmotes.length)];
            cat.innerText = randomEmote;
        }
        
        // 模擬「週日休館」以外的另一種邏輯：根據時間改變貓咪表情
        const hour = new Date().getHours();
        const cat = document.getElementById('cat-guardian');
        if (hour > 23 || hour < 5) {
            cat.innerText = '😴'; // 深夜時分，守護者也在休息
        }
    </script>
</body>
</html>
