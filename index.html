<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOWLEDGE GALLERY | 隨筆紀錄 - 動態路徑版</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --sunset-sky: #f4eade;
            --sunset-sun: #eac8af;
            --sunset-sea: #dcdedc;
            --muji-glass: rgba(252, 252, 252, 0.85);
        }

        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            margin: 0; line-height: 1.8; display: flex; justify-content: center;
            min-height: 100vh; color: #444; background-color: var(--sunset-sky);
            background-image: 
                radial-gradient(circle at 50% 75%, var(--sunset-sun) 0%, rgba(234, 200, 175, 0) 25%),
                linear-gradient(to bottom, rgba(244, 234, 222, 0) 65%, var(--sunset-sea) 65%, var(--sunset-sea) 100%);
            background-attachment: fixed;
        }

        .container {
            width: 100%; max-width: 750px; padding: 60px 20px; z-index: 1;
            background-color: var(--muji-glass); backdrop-filter: blur(5px);
            margin: 40px 0; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 300; letter-spacing: 5px; font-size: 1.4rem; color: #444; text-transform: uppercase; }

        .calendar-nav { text-align: center; margin-bottom: 30px; }
        #diary-picker {
            border: 1px solid var(--muji-border); padding: 8px 15px; border-radius: 20px;
            background: white; color: var(--muji-gray); cursor: pointer; outline: none;
        }

        .diary-wrapper { perspective: 1200px; margin-bottom: 50px; }
        .diary-card {
            background: #fff; border: 1px solid var(--muji-border); padding: 40px;
            border-radius: 2px; position: relative; box-shadow: 8px 8px 0px var(--sunset-sun);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
        }
        .diary-card.flipping { transform: rotateX(15deg) scale(0.95); opacity: 0.5; }

        .date-label {
            position: absolute; top: -12px; right: 30px; background: var(--sunset-sun);
            color: white; padding: 2px 18px; font-size: 0.7rem;
        }

        .template-box {
            background: #fff; border: 1px solid var(--muji-border); padding: 25px;
            margin-bottom: 50px; border-radius: 4px; position: relative;
        }
        .template-box::before {
            content: "PROTOCOL HELPER"; position: absolute; top: -10px; left: 20px;
            background: #fff; padding: 0 10px; font-size: 0.65rem; color: var(--muji-gray);
        }

        .copy-btn {
            background: #444; color: #fff; border: none; padding: 8px 15px;
            font-size: 0.75rem; cursor: pointer; border-radius: 2px; margin-top: 15px;
        }

        #giscus-container { margin-top: 40px; min-height: 300px; }
        
        #cat-guardian {
            position: fixed; bottom: 30px; right: 30px; font-size: 2.8rem;
            z-index: 100; cursor: pointer; transition: transform 0.3s;
        }
    </style>
</head>
<body>

    <div id="cat-guardian" onclick="changeCatStatus()">🐈</div>

    <div class="container">
        <header>
            <h1>Knowledge Gallery</h1>
        </header>

        <div class="calendar-nav">
            <input type="date" id="diary-picker" onchange="handleDateChange()">
            <div id="display-date" style="margin-top:10px; letter-spacing:2px;"></div>
        </div>

        <div class="diary-wrapper">
            <div class="diary-card" id="diary-card">
                <div class="date-label" id="card-label">SELECTED DATE</div>
                <div class="diary-content" id="diary-content">
                    <h2 id="diary-title" style="font-weight:400;">正在讀取紀錄...</h2>
                </div>
            </div>
        </div>

        <section class="template-box">
            <code id="template-text" style="font-size: 0.8rem; color: #888;">
                #隨筆 <span id="current-date-tag"></span><br>
                【知識點】：<br>
                【解析】：
            </code>
            <br>
            <button class="copy-btn" onclick="copyTemplate()">一鍵複製格式</button>
        </section>

        <!-- Giscus 容器 -->
        <div id="giscus-container"></div>
    </div>

    <script>
        // --- 設定區 ---
        const GISCUS_CONFIG = {
            "repo": "kitty32219/mindful-space",
            "repo-id": "R_kgDOSP7Znw",
            "category": "General",
            "category-id": "DIC_kwDOSP7Zn84C7984",
            "mapping": "specific", // 改用特定字串匹配
            "theme": "light",
            "lang": "zh-TW"
        };

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('diary-picker').value = today;
            updateDisplay(today);
            loadGiscus(today); // 初始載入
        };

        function handleDateChange() {
            const date = document.getElementById('diary-picker').value;
            const card = document.getElementById('diary-card');
            
            card.classList.add('flipping');
            
            // 重新加載 Giscus
            loadGiscus(date);
            
            setTimeout(() => {
                updateDisplay(date);
                card.classList.remove('flipping');
            }, 500);
        }

        function updateDisplay(date) {
            document.getElementById('display-date').innerText = date.replace(/-/g, ' / ');
            document.getElementById('diary-title').innerText = date + " 的隨筆空間";
            document.getElementById('current-date-tag').innerText = "#D" + date.replace(/-/g, '');
        }

        function loadGiscus(date) {
            const container = document.getElementById('giscus-container');
            
            // 1. 清空舊的 Giscus
            container.innerHTML = '';
            
            // 2. 建立新的 Script 標籤
            const script = document.createElement('script');
            script.src = "https://giscus.app/client.js";
            script.setAttribute("data-repo", GISCUS_CONFIG.repo);
            script.setAttribute("data-repo-id", GISCUS_CONFIG["repo-id"]);
            script.setAttribute("data-category", GISCUS_CONFIG.category);
            script.setAttribute("data-category-id", GISCUS_CONFIG["category-id"]);
            script.setAttribute("data-mapping", "specific");
            script.setAttribute("data-term", "diary-" + date); // 關鍵點：每一天一個獨立識別碼
            script.setAttribute("data-strict", "0");
            script.setAttribute("data-reactions-enabled", "1");
            script.setAttribute("data-emit-metadata", "0");
            script.setAttribute("data-input-position", "bottom");
            script.setAttribute("data-theme", GISCUS_CONFIG.theme);
            script.setAttribute("data-lang", GISCUS_CONFIG.lang);
            script.crossOrigin = "anonymous";
            script.async = true;
            
            container.appendChild(script);
        }

        function copyTemplate() {
            const text = document.getElementById('template-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('格式已複製！');
            });
        }

        function changeCatStatus() {
            const cat = document.getElementById('cat-guardian');
            const emotes = ['🐈', '🧐', '🐾', '📙'];
            cat.innerText = emotes[Math.floor(Math.random() * emotes.length)];
        }
    </script>
</body>
</html>
