<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOWLEDGE GALLERY | 知識藝廊</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --accent-sand: #d7ccc8;
        }

        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            background-color: var(--muji-white);
            color: #333;
            margin: 0;
            line-height: 1.8;
            display: flex;
            justify-content: center;
        }

        /* 橘色英短守護者：固定在右下角 */
        .cat-guardian {
            position: fixed;
            bottom: 30px;
            right: 30px;
            font-size: 2.5rem;
            z-index: 100;
            cursor: help;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.1));
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 5px;
            font-size: 1.4rem;
            color: #444;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--muji-gray);
            margin-top: 10px;
        }

        /* 投稿引導區塊 */
        .input-guide {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 30px;
            margin-bottom: 50px;
            border-radius: 2px;
            position: relative;
        }

        .input-guide::before {
            content: "ARCHIVE PROTOCOL";
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--muji-white);
            padding: 0 10px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--muji-gray);
        }

        .format-example {
            font-size: 0.9rem;
            color: #555;
        }

        .format-tag {
            display: inline-block;
            background: var(--accent-sand);
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-right: 10px;
            border-radius: 2px;
        }

        /* 留言區美化 */
        .giscus {
            margin-top: 40px;
        }

    </style>
</head>
<body>

    <!-- 守護者：橘色英短 -->
    <div class="cat-guardian" title="正在監督出處是否正確...">🐈</div>

    <div class="container">
        <header>
            <h1>Knowledge Gallery</h1>
            <div class="subtitle">每一份知識，都該有它的根。</div>
        </header>

        <section class="input-guide">
            <div class="format-example">
                <p><span class="format-tag">知識點</span> 簡短有力的一句話陳述</p>
                <p><span class="format-tag">解析</span> 邏輯推導或深度說明</p>
                <p><span class="format-tag">出處</span> 書籍、論文或可靠之網址</p>
            </div>
            <p style="font-size: 0.75rem; color: #999; margin-top: 20px;">
                * 註：沒有出處的知識，如同沒有地基的建築。
            </p>
        </section>

        <!-- 留言板 -->
        <div class="giscus">
<script src="https://giscus.app/client.js"
        data-repo="kitty32219/mindful-space"
        data-repo-id="R_kgDOSP7Znw"
        data-category="General"
        data-category-id="DIC_kwDOSP7Zn84C7984"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-TW"
        crossorigin="anonymous"
        async>
</script>
        </div>
    </div>

</body>
</html>
