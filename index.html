<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOWLEDGE GALLERY | 隨筆紀錄 - 夕陽限定</title>
    <style>
        :root {
            --muji-white: #fcfcfc;
            --muji-gray: #7f8c8d;
            --muji-border: #e0e0e0;
            --sunset-sky: #f4eade;
            --sunset-sun: #eac8af;
            --sunset-sea: #dcdedc;
            --muji-glass: rgba(252, 252, 252, 0.85);
        }

        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
            margin: 0;
            line-height: 1.8;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #444;
            background-color: var(--sunset-sky);
            background-image: 
                radial-gradient(circle at 50% 75%, var(--sunset-sun) 0%, rgba(234, 200, 175, 0) 25%),
                linear-gradient(to bottom, rgba(244, 234, 222, 0) 65%, var(--sunset-sea) 65%, var(--sunset-sea) 100%);
            background-attachment: fixed;
        }

        .scandi-illustration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none; opacity: 0.7;
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 60px 20px;
            z-index: 1;
            background-color: var(--muji-glass);
            backdrop-filter: blur(5px);
            margin: 40px 0;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-weight: 300; letter-spacing: 5px; font-size: 1.4rem; color: #444; text-transform: uppercase; margin-bottom: 10px; }
        
        /* --- 日曆與翻動卡片樣式 --- */
        .calendar-nav {
            text-align: center;
            margin-bottom: 30px;
        }

        #diary-picker {
            border: 1px solid var(--muji-border);
            padding: 8px 15px;
            border-radius: 20px;
            background: white;
            color: var(--muji-gray);
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
        }

        #diary-picker:hover { border-color: var(--sunset-sun); }

        #display-date {
            display: block;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            font-size: 1.1rem;
            color: #666;
        }

        .diary-wrapper {
            perspective: 1200px;
            margin-bottom: 50px;
        }

        .diary-card {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 40px;
            border-radius: 2px;
            position: relative;
            box-shadow: 8px 8px 0px var(--sunset-sun);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            transform-origin: center bottom;
        }

        /* 翻動動畫效果 */
        .diary-card.flipping {
            transform: rotateX(15deg) scale(0.95) translateY(-10px);
            opacity: 0.5;
        }

        .date-label {
            position: absolute;
            top: -12px;
            right: 30px;
            background: var(--sunset-sun);
            color: white;
            padding: 2px 18px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .diary-content {
            min-height: 120px;
            border-left: 2px solid var(--sunset-sky);
            padding-left: 20px;
        }

        .diary-content h2 {
            font-size: 1.1rem;
            font-weight: 400;
            margin-top: 0;
            color: #555;
        }

        /* --- 原有組件樣式 --- */
        .tag-cloud { text-align: center; margin-bottom: 30px; font-size: 0.75rem; color: var(--muji-gray); }
        .tag { margin: 0 5px; text-decoration: underline; cursor: pointer; }

        .template-box {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 25px;
            margin-bottom: 50px;
            border-radius: 4px;
            position: relative;
        }
        .template-box::before {
            content: "PROTOCOL HELPER";
            position: absolute;
            top: -10px; left: 20px;
            background: #fff;
            padding: 0 10px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--muji-gray);
        }

        .copy-btn {
            background: #444; color: #fff; border: none;
            padding: 8px 15px; font-size: 0.75rem;
            cursor: pointer; border-radius: 2px;
            margin-top: 15px; transition: background 0.3s;
        }
        .copy-btn:hover { background: #666; }

        #cat-guardian {
            position: fixed; bottom: 30px; right: 30px;
            font-size: 2.8rem; z-index: 100; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #cat-guardian:hover { transform: scale(1.2) rotate(5deg); }
    </style>
</head>
<body>

    <div class="scandi-illustration">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
            <defs>
                <style>
                    .st1 { fill: none; stroke: #a0a0a0; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
                    .st2 { fill: #fcfcfc; }
                </style>
            </defs>
            <g transform="translate(150, 150) scale(0.8)">
                <path class="st1" d="M0,10 C15,-5 30,10 30,10 L30,10 C45,25 60,10 60,10" />
            </g>
            <g transform="translate(750, 620)">
                <path class="st2" d="M0,30 L100,30 L80,50 L20,50 Z" /> 
                <path class="st1" d="M0,30 L100,30 L80,50 L20,50 Z" /> 
                <line class="st1" x1="50" y1="30" x2="50" y2="0" />
                <path class="st2" d="M50,0 L90,25 L50,25 Z" />
            </g>
        </svg>
    </div>

    <div id="cat-guardian" onclick="changeCatStatus()">🐈</div>

    <div class="container">
        <header>
            <h1>Knowledge Gallery</h1>
            <div class="tag-cloud">
                常用標籤：<span class="tag">#中醫</span> <span class="tag">#數學分析</span> <span class="tag">#投資邏輯</span> <span class="tag">#人性觀察</span>
            </div>
        </header>

        <!-- 日曆導覽 -->
        <div class="calendar-nav">
            <input type="date" id="diary-picker" onchange="handleDateChange()">
            <span id="display-date">讀取中...</span>
        </div>

        <!-- 隨筆卡片 -->
        <div class="diary-wrapper">
            <div class="diary-card" id="diary-card">
                <div class="date-label" id="card-label">TODAY</div>
                <div class="diary-content">
                    <h2 id="diary-title">今日隨筆紀錄</h2>
                    <p id="diary-placeholder" style="color: #999; font-style: italic;">
                        「溫故而知新，可以為師矣。」<br>
                        請在下方留言區記錄今日的發現。
                    </p>
                </div>
            </div>
        </div>

        <section class="template-box">
            <p style="font-size: 0.85rem; color: #555; margin-bottom: 15px;">使用格式投稿：</p>
            <code id="template-text" style="font-size: 0.8rem; color: #888; display: block; background: #f9f9f9; padding: 10px;">
                #標籤<br>
                【知識點】：<br>
                【解析】：<br>
                【出處】：
            </code>
            <button class="copy-btn" onclick="copyTemplate()">一鍵複製格式</button>
        </section>

        <div class="giscus">
            <script src="https://giscus.app/client.js"
                data-repo="kitty32219/mindful-space"
                data-repo-id="R_kgDOSP7Znw"
                data-category="General"
                data-category-id="DIC_kwDOSP7Zn84C7984"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="preferred_color_scheme"
                data-lang="zh-TW"
                crossorigin="anonymous"
                async>
            </script>
        </div>
    </div>

    <script>
        // 初始化日期
        window.onload = function() {
            const today = new Date();
            const dateStr = today.toISOString().split('T')[0];
            document.getElementById('diary-picker').value = dateStr;
            updateDisplay(dateStr);
        };

        function handleDateChange() {
            const picker = document.getElementById('diary-picker');
            const card = document.getElementById('diary-card');
            
            // 觸發翻動動畫類別
            card.classList.add('flipping');
            
            setTimeout(() => {
                updateDisplay(picker.value);
                card.classList.remove('flipping');
            }, 400);
        }

        function updateDisplay(dateStr) {
            const dateObj = new Date(dateStr);
            const formattedDate = dateStr.replace(/-/g, ' / ');
            document.getElementById('display-date').innerText = formattedDate;

            // 判斷是否為今天
            const todayStr = new Date().toISOString().split('T')[0];
            const label = document.getElementById('card-label');
            const title = document.getElementById('diary-title');
            
            if (dateStr === todayStr) {
                label.innerText = "TODAY";
                label.style.background = "var(--sunset-sun)";
                title.innerText = "今日隨筆紀錄";
            } else {
                label.innerText = "HISTORY";
                label.style.background = "#bdc3c7";
                title.innerText = formattedDate + " 的紀錄";
            }
        }

        function copyTemplate() {
            const text = document.getElementById('template-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('格式已複製，請至下方留言區貼上。');
            });
        }

        const catEmotes = ['🐈', '🧐', '🐾', '📙'];
        function changeCatStatus() {
            const cat = document.getElementById('cat-guardian');
            cat.innerText = catEmotes[Math.floor(Math.random() * catEmotes.length)];
        }
        
        const hour = new Date().getHours();
        if (hour > 23 || hour < 5) {
            document.getElementById('cat-guardian').innerText = '😴'; 
        }
    </script>
</body>
</html>
